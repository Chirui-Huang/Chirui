<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register - Chirui Huang</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 450px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .header p {
            color: #777;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .error-message {
            color: #dc3545;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .form-group input.error {
            border-color: #dc3545;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #777;
            font-size: 14px;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .info-text {
            color: #666;
            font-size: 13px;
            margin-top: 5px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <a href="/" class="back-link">← Back to Home</a>

    <div class="header">
        <h1>Create Account</h1>
        <p>Join our community and start participating</p>
    </div>

    <div class="success-message" id="successMessage"></div>

    <form id="registerForm">
        <div class="form-group">
            <label for="fullname">Full Name</label>
            <input 
                type="text" 
                id="fullname" 
                name="fullname" 
                placeholder="Your full name"
                maxlength="100"
            >
            <div class="error-message" id="fullnameError"></div>
        </div>

        <div class="form-group">
            <label for="username">Username</label>
            <input 
                type="text" 
                id="username" 
                name="username" 
                placeholder="3-20 characters (letters, numbers, -, _)"
                required
                minlength="3"
                maxlength="20"
                pattern="[a-zA-Z0-9_-]+"
            >
            <div class="info-text">Must be unique, 3-20 characters</div>
            <div class="error-message" id="usernameError"></div>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input 
                type="email" 
                id="email" 
                name="email" 
                placeholder="you@example.com"
                required
                maxlength="254"
            >
            <div class="info-text">We'll use this to contact you</div>
            <div class="error-message" id="emailError"></div>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input 
                type="password" 
                id="password" 
                name="password" 
                placeholder="At least 8 characters"
                required
                minlength="8"
            >
            <div class="info-text">Must be at least 8 characters</div>
            <div class="error-message" id="passwordError"></div>
        </div>

        <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input 
                type="password" 
                id="confirmPassword" 
                name="confirmPassword" 
                placeholder="Re-enter your password"
                required
                minlength="8"
            >
            <div class="error-message" id="confirmPasswordError"></div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Create Account</button>
    </form>

    <div class="login-link">
        Already have an account? <a href="/login.html">Sign in here</a>
    </div>
</div>

<script src="/js/security.js"></script>
<script src="/js/user-auth.js"></script>
<script>
    const form = document.getElementById('registerForm');
    const submitBtn = document.getElementById('submitBtn');
    const successMessage = document.getElementById('successMessage');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Clear previous errors
        document.querySelectorAll('.error-message').forEach(el => el.classList.remove('show'));
        document.querySelectorAll('input').forEach(el => el.classList.remove('error'));

        const fullname = document.getElementById('fullname').value;
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        // Validate passwords match
        if (password !== confirmPassword) {
            document.getElementById('confirmPasswordError').textContent = 'Passwords do not match';
            document.getElementById('confirmPasswordError').classList.add('show');
            document.getElementById('confirmPassword').classList.add('error');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Creating account...';

        try {
            const user = await userAuth.register(username, email, password, fullname);
            
            successMessage.textContent = '✓ Account created successfully! Redirecting...';
            successMessage.classList.add('show');

            // Redirect to dashboard or home after 2 seconds
            setTimeout(() => {
                window.location.href = '/dashboard.html';
            }, 2000);
        } catch (error) {
            console.error('Registration error:', error);
            
            // Show error based on field
            if (error.message.includes('email')) {
                document.getElementById('emailError').textContent = error.message;
                document.getElementById('emailError').classList.add('show');
                document.getElementById('email').classList.add('error');
            } else if (error.message.includes('username')) {
                document.getElementById('usernameError').textContent = error.message;
                document.getElementById('usernameError').classList.add('show');
                document.getElementById('username').classList.add('error');
            } else if (error.message.includes('password')) {
                document.getElementById('passwordError').textContent = error.message;
                document.getElementById('passwordError').classList.add('show');
                document.getElementById('password').classList.add('error');
            } else {
                alert('Error: ' + error.message);
            }

            submitBtn.disabled = false;
            submitBtn.textContent = 'Create Account';
        }
    });
</script>
</body>
</html>
