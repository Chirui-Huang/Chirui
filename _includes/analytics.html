<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google-analytics }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];

  function gtag(){dataLayer.push(arguments);}

  gtag('js', new Date());
  gtag('config', '{{ site.google-analytics }}');

  window.siteTrackEvent = function (eventName, params) {
    if (typeof gtag !== 'function') {
      return;
    }

    gtag('event', eventName, params || {});
  };

  (function attachInteractionTracking() {
    var trackedScrollDepths = {};
    var depthSteps = [25, 50, 75, 90];

    document.addEventListener('click', function (event) {
      var clickable = event.target.closest('a, button, [role="button"], input[type="submit"]');
      if (!clickable) {
        return;
      }

      var label = clickable.getAttribute('aria-label') || clickable.textContent || clickable.getAttribute('href') || clickable.id || clickable.className || clickable.tagName;
      window.siteTrackEvent('ui_click', {
        item_label: String(label).trim().slice(0, 120),
        item_tag: clickable.tagName.toLowerCase(),
        item_href: clickable.getAttribute('href') || '',
        page_path: window.location.pathname
      });
    });

    document.addEventListener('submit', function (event) {
      var form = event.target;
      if (!form || !form.tagName || form.tagName.toLowerCase() !== 'form') {
        return;
      }

      window.siteTrackEvent('form_submit', {
        form_id: form.id || '',
        form_action: form.getAttribute('action') || '',
        page_path: window.location.pathname
      });
    });

    window.addEventListener('scroll', function () {
      var doc = document.documentElement;
      var scrollTop = window.pageYOffset || doc.scrollTop || 0;
      var maxScrollable = Math.max(1, (doc.scrollHeight - window.innerHeight));
      var percent = Math.round((scrollTop / maxScrollable) * 100);

      depthSteps.forEach(function (step) {
        if (percent >= step && !trackedScrollDepths[step]) {
          trackedScrollDepths[step] = true;
          window.siteTrackEvent('scroll_depth', {
            depth_percent: step,
            page_path: window.location.pathname
          });
        }
      });
    }, { passive: true });
  })();
</script> <!-- /google analytics -->
